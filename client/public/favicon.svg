<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>BeeHired favicon</title>
  <desc>A friendly bee on an amber rounded square background</desc>

  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="#facc15"/>

  <!-- Wings -->
  <ellipse cx="21" cy="22" rx="10" ry="6" transform="rotate(-20 21 22)" fill="rgba(190,228,255,0.65)" stroke="#95c5e8" stroke-width="0.8"/>
  <ellipse cx="43" cy="22" rx="10" ry="6" transform="rotate(20 43 22)"  fill="rgba(190,228,255,0.65)" stroke="#95c5e8" stroke-width="0.8"/>

  <!-- Body -->
  <ellipse cx="32" cy="44" rx="10" ry="13" fill="#c59e04"/>
  <!-- Stripes -->
  <rect x="24.5" y="38" width="15" height="2" rx="1.5" fill="#1A1200" opacity="0.82"/>
  <rect x="24.5" y="47" width="15" height="2" rx="1.5" fill="#1A1200" opacity="0.82"/>

  <!-- Head -->
  <ellipse cx="32" cy="26" rx="10" ry="9.5" fill="#F9C523"/>

  <!-- Eyes -->
  <ellipse cx="28" cy="24" rx="2.5" ry="3" fill="#fff"/>
  <ellipse cx="36" cy="24" rx="2.5" ry="3" fill="#fff"/>
  <ellipse cx="28.5" cy="24.5" rx="1.4" ry="1.8" fill="#1A1200"/>
  <ellipse cx="36.5" cy="24.5" rx="1.4" ry="1.8" fill="#1A1200"/>
  <circle  cx="29.2" cy="23.6" r="0.65" fill="#fff"/>
  <circle  cx="37.2" cy="23.6" r="0.65" fill="#fff"/>

  <!-- Smile -->
  <path d="M28,30 Q32,34 36,30" fill="none" stroke="#1A1200" stroke-width="1.3" stroke-linecap="round"/>

  <!-- Antennae -->
  <path d="M29,17 Q25,11 22,7"  fill="none" stroke="#1A1200" stroke-width="1.4" stroke-linecap="round"/>
  <circle cx="21.5" cy="6.5" r="2" fill="#1A1200"/>
  <path d="M35,17 Q39,11 42,7"  fill="none" stroke="#1A1200" stroke-width="1.4" stroke-linecap="round"/>
  <circle cx="42.5" cy="6.5" r="2" fill="#1A1200"/>
</svg>
